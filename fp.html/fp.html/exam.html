<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam - Frontend Learning Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <button onclick="goBack()">← Back to Course</button>
        </nav>
        <h1 id="exam-title">Exam</h1>
        <p>Test your knowledge</p>
    </header>

    <main>
        <section class="exam-container">
            <div class="exam-info">
                <p><strong>Questions:</strong> <span id="total-questions">10</span></p>
                <p><strong>Passing Score:</strong> 70%</p>
                <p><strong>Time Limit:</strong> No time limit</p>
            </div>

            <form id="exam-form" onsubmit="submitExam(event)">
                <div id="questions-container">
                    <!-- Questions will be dynamically loaded here -->
                </div>

                <div class="exam-actions">
                    <button type="submit" class="submit-btn">Submit Exam</button>
                    <button type="button" onclick="goBack()" class="cancel-btn">Cancel</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2024 Frontend Learning Platform</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
